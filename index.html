<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Plugin Builder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: #252526;
            border-right: 1px solid #3e3e42;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 15px;
            background: #2d2d30;
            border-bottom: 1px solid #3e3e42;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            padding: 6px 12px;
            background: #0e639c;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #1177bb;
        }

        .btn:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .file-item {
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            border-radius: 3px;
            margin-bottom: 2px;
            transition: background 0.2s;
        }

        .file-item:hover {
            background: #2a2d2e;
        }

        .file-item.active {
            background: #37373d;
        }

        .file-icon {
            font-size: 16px;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .toolbar {
            padding: 10px 15px;
            background: #2d2d30;
            border-bottom: 1px solid #3e3e42;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .tabs {
            display: flex;
            background: #252526;
            border-bottom: 1px solid #3e3e42;
            overflow-x: auto;
        }

        .tab {
            padding: 10px 20px;
            background: #2d2d30;
            border-right: 1px solid #3e3e42;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .tab.active {
            background: #1e1e1e;
        }

        .tab-close {
            margin-left: 10px;
            opacity: 0.5;
            cursor: pointer;
        }

        .tab-close:hover {
            opacity: 1;
        }

        .editor {
            flex: 1;
            position: relative;
        }

        #codeEditor {
            width: 100%;
            height: 100%;
            background: #1e1e1e;
            color: #d4d4d4;
            border: none;
            padding: 15px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #252526;
            padding: 25px;
            border-radius: 8px;
            min-width: 400px;
            border: 1px solid #3e3e42;
        }

        .modal-header {
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 8px;
            background: #3c3c3c;
            border: 1px solid #555;
            color: #d4d4d4;
            border-radius: 3px;
            font-size: 14px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .status-bar {
            padding: 5px 15px;
            background: #007acc;
            color: white;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }

        .loading {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #252526;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #3e3e42;
            z-index: 2000;
            text-align: center;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid #3e3e42;
            border-top: 3px solid #0e639c;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        ::-webkit-scrollbar-thumb {
            background: #424242;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #4e4e4e;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <span>📁 Files</span>
                <button class="btn" onclick="showNewFileModal()">+ New</button>
            </div>
            <div class="file-tree" id="fileTree"></div>
        </div>

        <div class="main-content">
            <div class="toolbar">
                <button class="btn" onclick="showNewProjectModal()">🆕 New Project</button>
                <button class="btn" id="compileBtn" onclick="compileAndDownload()">⚙️ Compile & Download .jar</button>
                <button class="btn" onclick="showTemplatesModal()">📋 Templates</button>
            </div>

            <div class="editor-container">
                <div class="tabs" id="tabs"></div>
                <div class="editor">
                    <textarea id="codeEditor" spellcheck="false"></textarea>
                </div>
            </div>

            <div class="status-bar">
                <span id="statusText">Ready</span>
                <span id="fileInfo">No file open</span>
            </div>
        </div>
    </div>

    <!-- Loading Modal -->
    <div class="loading" id="loadingModal">
        <div class="spinner"></div>
        <div>Compiling plugin...</div>
        <div style="font-size: 12px; opacity: 0.7; margin-top: 10px;">This may take a minute</div>
    </div>

    <!-- New File Modal -->
    <div class="modal" id="newFileModal">
        <div class="modal-content">
            <div class="modal-header">Create New File</div>
            <div class="form-group">
                <label>File Name:</label>
                <input type="text" id="newFileName" placeholder="Example: MyPlugin.java">
            </div>
            <div class="modal-buttons">
                <button class="btn" onclick="closeModal('newFileModal')">Cancel</button>
                <button class="btn" onclick="createNewFile()">Create</button>
            </div>
        </div>
    </div>

    <!-- New Project Modal -->
    <div class="modal" id="newProjectModal">
        <div class="modal-content">
            <div class="modal-header">Create New Plugin Project</div>
            <div class="form-group">
                <label>Plugin Name:</label>
                <input type="text" id="pluginName" placeholder="MyAwesomePlugin">
            </div>
            <div class="form-group">
                <label>Package Name:</label>
                <input type="text" id="packageName" placeholder="com.example.myplugin">
            </div>
            <div class="form-group">
                <label>Minecraft Version:</label>
                <select id="mcVersion">
                    <option value="1.20.4">1.20.4</option>
                    <option value="1.20.1">1.20.1</option>
                    <option value="1.19.4">1.19.4</option>
                    <option value="1.18.2">1.18.2</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button class="btn" onclick="closeModal('newProjectModal')">Cancel</button>
                <button class="btn" onclick="createNewProject()">Create Project</button>
            </div>
        </div>
    </div>

    <!-- Templates Modal -->
    <div class="modal" id="templatesModal">
        <div class="modal-content">
            <div class="modal-header">Plugin Templates</div>
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px;">
                <div onclick="loadTemplate('basic')" style="padding: 15px; background: #3c3c3c; border: 1px solid #555; border-radius: 5px; cursor: pointer;">
                    <h3 style="font-size: 14px; margin-bottom: 5px;">🎮 Basic Plugin</h3>
                    <p style="font-size: 12px; opacity: 0.7;">Simple plugin with commands</p>
                </div>
                <div onclick="loadTemplate('events')" style="padding: 15px; background: #3c3c3c; border: 1px solid #555; border-radius: 5px; cursor: pointer;">
                    <h3 style="font-size: 14px; margin-bottom: 5px;">⚡ Event Handler</h3>
                    <p style="font-size: 12px; opacity: 0.7;">Listen to game events</p>
                </div>
                <div onclick="loadTemplate('gui')" style="padding: 15px; background: #3c3c3c; border: 1px solid #555; border-radius: 5px; cursor: pointer;">
                    <h3 style="font-size: 14px; margin-bottom: 5px;">📦 Custom GUI</h3>
                    <p style="font-size: 12px; opacity: 0.7;">Inventory-based menus</p>
                </div>
                <div onclick="loadTemplate('economy')" style="padding: 15px; background: #3c3c3c; border: 1px solid #555; border-radius: 5px; cursor: pointer;">
                    <h3 style="font-size: 14px; margin-bottom: 5px;">💰 Economy Plugin</h3>
                    <p style="font-size: 12px; opacity: 0.7;">Custom currency system</p>
                </div>
            </div>
            <div class="modal-buttons">
                <button class="btn" onclick="closeModal('templatesModal')">Close</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://backend-11zq.onrender.com/api';
        let files = {};
        let activeFile = null;
        let projectConfig = {
            name: 'MyPlugin',
            package: 'com.example.myplugin',
            version: '1.20.4'
        };

        const editor = document.getElementById('codeEditor');

        function initDefaultProject() {
            files = {
                'plugin.yml': generatePluginYml(),
                'Main.java': generateMainClass()
            };
            renderFileTree();
            openFile('Main.java');
        }

        function generatePluginYml() {
            return `name: ${projectConfig.name}
version: 1.0
main: ${projectConfig.package}.Main
api-version: ${projectConfig.version}
author: YourName
description: A custom Minecraft plugin

commands:
  hello:
    description: Say hello
    usage: /hello

permissions:
  myplugin.use:
    description: Allows using the plugin
    default: true`;
        }

        function generateMainClass() {
            return `package ${projectConfig.package};

import org.bukkit.plugin.java.JavaPlugin;
import org.bukkit.command.Command;
import org.bukkit.command.CommandSender;
import org.bukkit.entity.Player;

public class Main extends JavaPlugin {
    
    @Override
    public void onEnable() {
        getLogger().info("${projectConfig.name} has been enabled!");
    }
    
    @Override
    public void onDisable() {
        getLogger().info("${projectConfig.name} has been disabled!");
    }
    
    @Override
    public boolean onCommand(CommandSender sender, Command command, String label, String[] args) {
        if (command.getName().equalsIgnoreCase("hello")) {
            if (sender instanceof Player) {
                Player player = (Player) sender;
                player.sendMessage("§aHello, " + player.getName() + "!");
            } else {
                sender.sendMessage("This command can only be used by players!");
            }
            return true;
        }
        return false;
    }
}`;
        }

        function getFileIcon(filename) {
            if (filename.endsWith('.java')) return '☕';
            if (filename.endsWith('.yml')) return '⚙️';
            if (filename.endsWith('.txt')) return '📄';
            if (filename.endsWith('.json')) return '📋';
            return '📄';
        }

        function renderFileTree() {
            const fileTree = document.getElementById('fileTree');
            fileTree.innerHTML = '';
            
            Object.keys(files).forEach(filename => {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item' + (activeFile === filename ? ' active' : '');
                fileItem.innerHTML = `
                    <span class="file-icon">${getFileIcon(filename)}</span>
                    <span>${filename}</span>
                `;
                fileItem.onclick = () => openFile(filename);
                fileTree.appendChild(fileItem);
            });
        }

        function openFile(filename) {
            activeFile = filename;
            editor.value = files[filename];
            renderFileTree();
            renderTabs();
            document.getElementById('fileInfo').textContent = filename;
            updateStatus('Opened: ' + filename);
        }

        function renderTabs() {
            const tabs = document.getElementById('tabs');
            tabs.innerHTML = '';
            
            Object.keys(files).forEach(filename => {
                const tab = document.createElement('div');
                tab.className = 'tab' + (activeFile === filename ? ' active' : '');
                tab.innerHTML = `
                    <span>${getFileIcon(filename)} ${filename}</span>
                    <span class="tab-close" onclick="event.stopPropagation(); closeFile('${filename}')">×</span>
                `;
                tab.onclick = () => openFile(filename);
                tabs.appendChild(tab);
            });
        }

        function closeFile(filename) {
            delete files[filename];
            if (activeFile === filename) {
                const remaining = Object.keys(files);
                activeFile = remaining.length > 0 ? remaining[0] : null;
                if (activeFile) {
                    openFile(activeFile);
                } else {
                    editor.value = '';
                    document.getElementById('fileInfo').textContent = 'No file open';
                }
            }
            renderFileTree();
            renderTabs();
        }

        function showNewFileModal() {
            document.getElementById('newFileModal').classList.add('active');
            document.getElementById('newFileName').focus();
        }

        function showNewProjectModal() {
            document.getElementById('newProjectModal').classList.add('active');
        }

        function showTemplatesModal() {
            document.getElementById('templatesModal').classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function createNewFile() {
            const filename = document.getElementById('newFileName').value.trim();
            if (!filename) {
                alert('Please enter a file name');
                return;
            }
            
            if (files[filename]) {
                alert('File already exists');
                return;
            }
            
            let content = '';
            if (filename.endsWith('.java')) {
                content = `package ${projectConfig.package};\n\npublic class ${filename.replace('.java', '')} {\n    \n}\n`;
            }
            
            files[filename] = content;
            openFile(filename);
            closeModal('newFileModal');
            document.getElementById('newFileName').value = '';
            updateStatus('Created: ' + filename);
        }

        function createNewProject() {
            const name = document.getElementById('pluginName').value.trim();
            const pkg = document.getElementById('packageName').value.trim();
            const version = document.getElementById('mcVersion').value;
            
            if (!name || !pkg) {
                alert('Please fill in all fields');
                return;
            }
            
            projectConfig = { name, package: pkg, version };
            files = {
                'plugin.yml': generatePluginYml(),
                'Main.java': generateMainClass()
            };
            
            renderFileTree();
            openFile('Main.java');
            closeModal('newProjectModal');
            updateStatus('Project created: ' + name);
        }

        function loadTemplate(type) {
            let template = '';
            
            switch(type) {
                case 'basic':
                    template = generateMainClass();
                    break;
                case 'events':
                    template = `package ${projectConfig.package};

import org.bukkit.plugin.java.JavaPlugin;
import org.bukkit.event.Listener;
import org.bukkit.event.EventHandler;
import org.bukkit.event.player.PlayerJoinEvent;
import org.bukkit.event.player.PlayerQuitEvent;
import org.bukkit.entity.Player;

public class Main extends JavaPlugin implements Listener {
    
    @Override
    public void onEnable() {
        getServer().getPluginManager().registerEvents(this, this);
        getLogger().info("Event listener registered!");
    }
    
    @EventHandler
    public void onPlayerJoin(PlayerJoinEvent event) {
        Player player = event.getPlayer();
        event.setJoinMessage("§a" + player.getName() + " joined the game!");
        player.sendMessage("§eWelcome to the server!");
    }
    
    @EventHandler
    public void onPlayerQuit(PlayerQuitEvent event) {
        Player player = event.getPlayer();
        event.setQuitMessage("§c" + player.getName() + " left the game!");
    }
}`;
                    break;
                case 'gui':
                    template = `package ${projectConfig.package};

import org.bukkit.plugin.java.JavaPlugin;
import org.bukkit.inventory.Inventory;
import org.bukkit.inventory.ItemStack;
import org.bukkit.inventory.meta.ItemMeta;
import org.bukkit.Material;
import org.bukkit.entity.Player;
import org.bukkit.event.Listener;
import org.bukkit.event.EventHandler;
import org.bukkit.event.inventory.InventoryClickEvent;
import org.bukkit.command.Command;
import org.bukkit.command.CommandSender;
import java.util.Arrays;

public class Main extends JavaPlugin implements Listener {
    
    @Override
    public void onEnable() {
        getServer().getPluginManager().registerEvents(this, this);
    }
    
    @Override
    public boolean onCommand(CommandSender sender, Command command, String label, String[] args) {
        if (command.getName().equalsIgnoreCase("menu") && sender instanceof Player) {
            Player player = (Player) sender;
            openCustomMenu(player);
            return true;
        }
        return false;
    }
    
    private void openCustomMenu(Player player) {
        Inventory inv = getServer().createInventory(null, 27, "§6Custom Menu");
        
        ItemStack item1 = new ItemStack(Material.DIAMOND);
        ItemMeta meta1 = item1.getItemMeta();
        meta1.setDisplayName("§bSpecial Diamond");
        meta1.setLore(Arrays.asList("§7A special diamond", "§7Click to get it!"));
        item1.setItemMeta(meta1);
        inv.setItem(13, item1);
        
        player.openInventory(inv);
    }
    
    @EventHandler
    public void onInventoryClick(InventoryClickEvent event) {
        if (event.getView().getTitle().equals("§6Custom Menu")) {
            event.setCancelled(true);
            if (event.getCurrentItem() != null && event.getCurrentItem().getType() == Material.DIAMOND) {
                Player player = (Player) event.getWhoClicked();
                player.sendMessage("§aYou clicked the diamond!");
                player.getInventory().addItem(new ItemStack(Material.DIAMOND));
                player.closeInventory();
            }
        }
    }
}`;
                    break;
                case 'economy':
                    template = `package ${projectConfig.package};

import org.bukkit.plugin.java.JavaPlugin;
import org.bukkit.command.Command;
import org.bukkit.command.CommandSender;
import org.bukkit.entity.Player;
import java.util.HashMap;
import java.util.UUID;

public class Main extends JavaPlugin {
    
    private HashMap<UUID, Double> balances = new HashMap<>();
    
    @Override
    public void onEnable() {
        getLogger().info("Economy system enabled!");
    }
    
    @Override
    public boolean onCommand(CommandSender sender, Command command, String label, String[] args) {
        if (!(sender instanceof Player)) {
            sender.sendMessage("Only players can use this command!");
            return true;
        }
        
        Player player = (Player) sender;
        
        if (command.getName().equalsIgnoreCase("balance")) {
            double balance = getBalance(player);
            player.sendMessage("§aYour balance: §e$" + balance);
            return true;
        }
        
        if (command.getName().equalsIgnoreCase("pay") && args.length >= 2) {
            Player target = getServer().getPlayer(args[0]);
            if (target == null) {
                player.sendMessage("§cPlayer not found!");
                return true;
            }
            
            double amount;
            try {
                amount = Double.parseDouble(args[1]);
            } catch (NumberFormatException e) {
                player.sendMessage("§cInvalid amount!");
                return true;
            }
            
            if (getBalance(player) >= amount) {
                withdraw(player, amount);
                deposit(target, amount);
                player.sendMessage("§aPaid $" + amount + " to " + target.getName());
                target.sendMessage("§aReceived $" + amount + " from " + player.getName());
            } else {
                player.sendMessage("§cInsufficient funds!");
            }
            return true;
        }
        
        return false;
    }
    
    private double getBalance(Player player) {
        return balances.getOrDefault(player.getUniqueId(), 0.0);
    }
    
    private void deposit(Player player, double amount) {
        balances.put(player.getUniqueId(), getBalance(player) + amount);
    }
    
    private void withdraw(Player player, double amount) {
        balances.put(player.getUniqueId(), getBalance(player) - amount);
    }
}`;
                    break;
            }
            
            files['Main.java'] = template;
            openFile('Main.java');
            closeModal('templatesModal');
            updateStatus('Template loaded: ' + type);
        }

        async function compileAndDownload() {
            // Save current editor content
            if (activeFile) {
                files[activeFile] = editor.value;
            }

            const compileBtn = document.getElementById('compileBtn');
            const loadingModal = document.getElementById('loadingModal');
            
            compileBtn.disabled = true;
            loadingModal.classList.add('active');
            updateStatus('Compiling...');

            try {
                const response = await fetch(`${API_URL}/compile`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        projectName: projectConfig.name,
                        packageName: projectConfig.package,
                        mcVersion: projectConfig.version,
                        files: files
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Compilation failed');
                }

                // Download file
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${projectConfig.name}.jar`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);

                updateStatus('✅ Downloaded: ' + projectConfig.name + '.jar');
                alert(`✅ Plugin compiled successfully!\n\n📦 File: ${projectConfig.name}.jar\n\n📝 Installation:\n1. Place the .jar file in your server's plugins/ folder\n2. Restart or reload your server\n3. The plugin is ready to use!`);

            } catch (error) {
                console.error('Compilation error:', error);
                updateStatus('❌ Compilation failed');
                alert(`❌ Compilation failed!\n\nError: ${error.message}\n\nPlease check your code for errors.`);
            } finally {
                compileBtn.disabled = false;
                loadingModal.classList.remove('active');
            }
        }

        function updateStatus(message) {
            document.getElementById('statusText').textContent = message;
            setTimeout(() => {
                document.getElementById('statusText').textContent = 'Ready';
            }, 3000);
        }

        // Auto-save on editor change
        editor.addEventListener('input', () => {
            if (activeFile) {
                files[activeFile] = editor.value;
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                if (activeFile) {
                    files[activeFile] = editor.value;
                    updateStatus('Saved: ' + activeFile);
                }
            }
        });

        // Close modals on outside click
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });

        // Initialize
        initDefaultProject();
    </script>
</body>
</html>
