<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — MC Rank Store</title>
<style>
  :root{--bg:#0e1117;--panel:#161b22;--panel2:#1c2330;--line:#262d3a;--txt:#e6edf3;
    --muted:#8b949e;--green:#3fb950;--green2:#2ea043;--gold:#f0b90b;--red:#f85149;--radius:12px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",Roboto,"Noto Sans Khmer",system-ui,sans-serif;background:var(--bg);color:var(--txt);line-height:1.55}
  a{color:var(--green);text-decoration:none}
  .wrap{max-width:1080px;margin:0 auto;padding:0 18px}
  header{border-bottom:1px solid var(--line);background:rgba(14,17,23,.8)}
  .nav{display:flex;align-items:center;justify-content:space-between;height:60px}
  .nav .t{font-weight:800;font-size:18px;display:flex;align-items:center;gap:9px}
  .nav .t .cube{width:28px;height:28px;border-radius:6px;background:linear-gradient(135deg,#3fb950,#1a7f37);
    display:grid;place-items:center;font-size:15px}
  .btn{padding:9px 16px;border-radius:9px;border:none;cursor:pointer;font-weight:700;font-size:14px;
    font-family:inherit;color:#fff;background:var(--green2);transition:filter .15s}
  .btn:hover{filter:brightness(1.1)}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt)}
  .btn.gold{background:var(--gold);color:#1a1300}
  .btn.red{background:#5d2329;color:#ff9aa6;border:1px solid #7a2d34}
  .btn.sm{padding:6px 11px;font-size:13px}

  /* login */
  #login{display:grid;place-items:center;min-height:80vh}
  .login-box{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:32px;width:100%;max-width:380px}
  .login-box h1{font-size:22px;margin-bottom:6px}
  .login-box p{color:var(--muted);font-size:14px;margin-bottom:20px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:600}
  .field input{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    padding:11px 13px;border-radius:9px;font-size:15px;font-family:inherit}
  .field input:focus{outline:none;border-color:var(--green)}
  .err{background:#3b1219;border:1px solid #6e2a37;color:#ff9aa6;padding:9px 11px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none}

  /* dashboard */
  #dash{display:none;padding:24px 0 60px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:24px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
  .stat .l{color:var(--muted);font-size:13px;font-weight:600}
  .stat .v{font-size:28px;font-weight:900;margin-top:4px}
  .stat .v.gold{color:var(--gold)}
  .stat .v.green{color:var(--green)}

  .tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .tab{padding:8px 16px;border-radius:9px;border:1px solid var(--line);background:transparent;color:var(--muted);
    cursor:pointer;font-weight:600;font-size:14px;font-family:inherit}
  .tab.active{background:var(--panel2);color:var(--txt);border-color:#3a4658}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{padding:12px 14px;text-align:left;border-bottom:1px solid var(--line)}
  th{background:var(--panel2);color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.4px;font-weight:700}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(255,255,255,.02)}
  .pill{display:inline-block;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:700}
  .pill.paid{background:#0d2818;color:var(--green)}
  .pill.pending{background:#2a230c;color:var(--gold)}
  .overflow-x{overflow-x:auto}
  .uname{font-weight:700;color:var(--txt)}
  .md5{font-family:monospace;font-size:11px;color:var(--muted)}
  .empty{padding:40px;text-align:center;color:var(--muted)}

  /* ranks management */
  .rank-row{display:flex;align-items:center;gap:14px;padding:14px;border-bottom:1px solid var(--line)}
  .rank-row:last-child{border-bottom:none}
  .swatch{width:34px;height:34px;border-radius:8px;flex-shrink:0}
  .rank-row .info{flex:1;min-width:0}
  .rank-row .info b{font-size:16px}
  .rank-row .info .pp{color:var(--muted);font-size:13px}
  .add-form{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;padding:16px}
  .add-form input{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:10px;border-radius:8px;font-family:inherit}
  .add-form input:focus{outline:none;border-color:var(--green)}
  .hint{color:var(--muted);font-size:12px;padding:0 16px 14px}
  code{background:var(--panel2);padding:2px 6px;border-radius:5px;font-size:12px;color:var(--gold)}
</style>
</head>
<body>

<header>
  <div class="wrap nav">
    <div class="t"><span class="cube">⛏️</span> Admin Panel</div>
    <div style="display:flex;gap:8px">
      <a class="btn ghost sm" href="/">← ត្រលប់ហាង</a>
      <button class="btn red sm" id="logout" style="display:none">ចាកចេញ</button>
    </div>
  </div>
</header>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h1>ចូល Admin</h1>
    <p>បញ្ចូលពាក្យសម្ងាត់រដ្ឋបាល</p>
    <div class="err" id="err"></div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn" style="width:100%" onclick="doLogin()">ចូល</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dash" class="wrap">
  <div class="stats" id="stats"></div>

  <div class="tabs">
    <button class="tab active" data-tab="orders" onclick="setTab('orders')">📦 ការ៉ង់ទិញ</button>
    <button class="tab" data-tab="ranks" onclick="setTab('ranks')">🏆 គ្រប់គ្រង Rank</button>
  </div>

  <!-- orders -->
  <div id="t-orders" class="pane">
    <div class="panel overflow-x">
      <table>
        <thead><tr>
          <th>Order</th><th>ឈ្មោះ</th><th>Rank</th><th>តម្លៃ</th>
          <th>ស្ថានភាព</th><th>ផ្ដល់</th><th>កាលបរិច្ឆេទ</th>
        </tr></thead>
        <tbody id="ordersBody"><tr><td colspan="7" class="empty">កំពុងផ្ទុក…</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- ranks -->
  <div id="t-ranks" class="pane" style="display:none">
    <div class="panel">
      <div class="add-form">
        <input id="r_name" placeholder="ឈ្មោះ Rank (VIP)">
        <input id="r_price" type="number" step="0.5" placeholder="តម្លៃ ($)">
        <input id="r_color" placeholder="ពណ៌ (#27ae60)" value="#3fb950">
        <input id="r_perks" placeholder="perks (កាបិតមុញ)">
        <input id="r_command" placeholder="command">
        <button class="btn" onclick="addRank()">+ បន្ថែម Rank</button>
      </div>
      <div class="hint">command ឧ. <code>lp user {'{username}'} parent set vip</code> ឬ <code>manuadd {'{username}'} vip</code> • perks បំបែកដោយ <code>|</code> ឬកាបិតមុញ។</div>
      <div id="ranksBody"></div>
    </div>
  </div>
</div>

<script>
const API="";
let TOKEN=localStorage.getItem("mc_admin")||"";
let activeTab="orders";
const $=s=>document.querySelector(s);

/* ---- auth ---- */
async function doLogin(){
  const pw=$("#pw").value;
  const err=$("#err"); err.style.display="none";
  try{
    const r=await fetch(API+"/api/admin/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pw})});
    const d=await r.json();
    if(!r.ok) throw new Error(d.error||"ខុស");
    TOKEN=d.token; localStorage.setItem("mc_admin",TOKEN);
    enterDash();
  }catch(e){ err.textContent=e.message; err.style.display="block"; }
}
$("#logout").onclick=()=>{localStorage.removeItem("mc_admin");TOKEN="";location.reload();};

function headers(){return {"Authorization":"Bearer "+TOKEN,"Content-Type":"application/json"};}

function enterDash(){
  $("#login").style.display="none";
  $("#dash").style.display="block";
  $("#logout").style.display="inline-block";
  loadStats(); loadOrders(); loadRanks();
}

/* ---- tabs ---- */
function setTab(t){
  activeTab=t;
  document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("active",b.dataset.tab===t));
  document.querySelectorAll(".pane").forEach(p=>p.style.display="none");
  $("#t-"+t).style.display="block";
}

/* ---- stats ---- */
async function loadStats(){
  try{
    const r=await fetch(API+"/api/admin/stats",{headers:headers()});
    if(r.status===401){return sessionOut();}
    const d=await r.json();
    const rev=Object.entries(d.revenue||{}).map(([c,a])=>`$${(a||0).toFixed(2)} ${c}`).join(" + ")||"$0";
    $("#stats").innerHTML=`
      <div class="stat"><div class="l">ការ៉ង់សរុប</div><div class="v">${d.total_orders}</div></div>
      <div class="stat"><div class="l">បានបង់រួច</div><div class="v green">${d.paid}</div></div>
      <div class="stat"><div class="l">រង់ចាំ</div><div class="v gold">${d.pending}</div></div>
      <div class="stat"><div class="l">ប្រាក់បាន</div><div class="v gold">${rev}</div></div>`;
  }catch(e){}
}

/* ---- orders ---- */
async function loadOrders(){
  try{
    const r=await fetch(API+"/api/admin/orders",{headers:headers()});
    if(r.status===401){return sessionOut();}
    const list=await r.json();
    const tb=$("#ordersBody");
    if(!list.length){tb.innerHTML='<tr><td colspan="7" class="empty">មិនទាន់មានការ៉ង់</td></tr>';return;}
    tb.innerHTML=list.map(o=>`
      <tr>
        <td><div class="uname">${o.order_ref}</div><div class="md5">${o.md5||"-"}</div></td>
        <td><div class="uname">${escapeHtml(o.username)}</div></td>
        <td><span style="color:${o.color||'#ccc'};font-weight:700">${escapeHtml(o.rank_name)}</span></td>
        <td>$${o.amount} ${o.currency}</td>
        <td><span class="pill ${o.status}">${o.status}</span></td>
        <td>${o.delivered?"✅ ផ្ដល់រួច":(o.status==="paid"?"⏳ កំពុង…":"—")}</td>
        <td style="font-size:12px;color:var(--muted)">${fmtDate(o.created_at)}</td>
      </tr>`).join("");
  }catch(e){}
}

/* ---- ranks ---- */
async function loadRanks(){
  try{
    const r=await fetch(API+"/api/admin/ranks",{headers:headers()});
    if(r.status===401){return sessionOut();}
    const list=await r.json();
    $("#ranksBody").innerHTML=list.map(rk=>`
      <div class="rank-row">
        <div class="swatch" style="background:${rk.color}"></div>
        <div class="info">
          <b>${escapeHtml(rk.name)} ${rk.active?"":'<span class="pill pending">បិទ</span>'}</b>
          <div class="pp">$${rk.price} ${rk.currency} • ${(rk.perks||[]).join(" · ")||"គ្មាន perks"}</div>
          ${rk.command?`<div class="pp"><code>${escapeHtml(rk.command)}</code></div>`:""}
        </div>
        <button class="btn ghost sm" onclick="toggleRank('${rk.id}',${rk.active?0:1})">${rk.active?"បិទ":"បើក"}</button>
        <button class="btn red sm" onclick="delRank('${rk.id}')">លុប</button>
      </div>`).join("");
  }catch(e){}
}

async function addRank(){
  const name=$("#r_name").value.trim();
  const price=parseFloat($("#r_price").value||"0");
  const color=($("#r_color").value||"#3fb950").trim();
  const perks=($("#r_perks").value||"").split(/[,|]/).map(s=>s.trim()).filter(Boolean);
  const command=$("#r_command").value.trim();
  if(!name){alert("ដាក់ឈ្មោះ Rank");return;}
  const id="rank_"+Math.random().toString(36).slice(2,8);
  const r=await fetch(API+"/api/admin/ranks",{method:"POST",headers:headers(),
    body:JSON.stringify({id,name,price,color,perks,command,active:true,sort_order:99})});
  if(r.ok){["r_name","r_price","r_perks","r_command"].forEach(i=>$("#"+i).value="");loadRanks();loadStats();}
  else alert("បរាជ័យ");
}
async function toggleRank(id,val){
  const r=await fetch(API+"/api/admin/ranks",{method:"POST",headers:headers(),
    body:JSON.stringify({id,active:!!val})});
  if(r.ok) loadRanks();
}
async function delRank(id){
  if(!confirm("លុប Rank នេះ?"))return;
  const r=await fetch(API+"/api/admin/ranks/"+id,{method:"DELETE",headers:headers()});
  if(r.ok) loadRanks();
}

function sessionOut(){TOKEN="";localStorage.removeItem("mc_admin");location.reload();}
function fmtDate(s){if(!s)return"-";const d=new Date(s+"Z");return d.toLocaleString();}
function escapeHtml(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

/* auto-refresh orders every 8s */
if(TOKEN){enterDash(); setInterval(()=>{if(activeTab==="orders")loadOrders();},8000);} else {$("#pw").focus();}
</script>
</body>
</html>
